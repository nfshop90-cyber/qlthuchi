<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thu Chi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/date-fns@2.30.0/dist/date-fns.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = framerMotion;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = Recharts;
        const { format, startOfMonth, endOfMonth, parseISO, addMonths, subMonths, isWithinInterval, startOfDay, endOfDay, addDays, addWeeks, isAfter } = dateFns;

        const DEFAULT_CATEGORIES = [
            { id: 'cat-1', name: 'Ăn uống', icon: 'Utensils', color: '#f87171' },
            { id: 'cat-2', name: 'Di chuyển', icon: 'Car', color: '#60a5fa' },
            { id: 'cat-3', name: 'Mua sắm', icon: 'ShoppingBag', color: '#fbbf24' },
            { id: 'cat-4', name: 'Giải trí', icon: 'Gamepad2', color: '#a78bfa' },
            { id: 'cat-5', name: 'Nhà cửa', icon: 'Home', color: '#4ade80' },
            { id: 'cat-6', name: 'Khác', icon: 'MoreHorizontal', color: '#94a3b8' },
        ];

        function App() {
            const [data, setData] = useState(() => JSON.parse(localStorage.getItem('expense_manager_data') || '{}'));
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('expense_manager_categories') || JSON.stringify(DEFAULT_CATEGORIES)));
            const [recurringExpenses, setRecurringExpenses] = useState(() => JSON.parse(localStorage.getItem('expense_manager_recurring') || '[]'));
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [activeTab, setActiveTab] = useState('overview');
            const [showAddModal, setShowAddModal] = useState(false);
            const [showBudgetModal, setShowBudgetModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [budgetInput, setBudgetInput] = useState('');
            const [expenseAmount, setExpenseAmount] = useState('');
            const [expenseCategory, setExpenseCategory] = useState(categories[0]?.id || '');
            const [isRecurring, setIsRecurring] = useState(false);
            const [recurringFrequency, setRecurringFrequency] = useState('monthly');
            const [catName, setCatName] = useState('');
            const [catColor, setCatColor] = useState('#6366f1');
            const [editingCategory, setEditingCategory] = useState(null);
            const [selectedCategoryFilter, setSelectedCategoryFilter] = useState('all');
            const [selectedReportCategory, setSelectedReportCategory] = useState(null);
            const [reportDateRange, setReportDateRange] = useState({
                start: format(startOfMonth(new Date()), 'yyyy-MM-dd'),
                end: format(endOfMonth(new Date()), 'yyyy-MM-dd')
            });

            useEffect(() => { lucide.createIcons(); });
            useEffect(() => { localStorage.setItem('expense_manager_data', JSON.stringify(data)); }, [data]);
            useEffect(() => { localStorage.setItem('expense_manager_categories', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('expense_manager_recurring', JSON.stringify(recurringExpenses)); }, [recurringExpenses]);
            useEffect(() => { processRecurringExpenses(); }, []);

            const processRecurringExpenses = () => {
                const now = new Date();
                let updatedRecurring = [...recurringExpenses];
                let newData = { ...data };
                let hasChanges = false;
                updatedRecurring = updatedRecurring.map(recurring => {
                    const startDate = parseISO(recurring.startDate);
                    const lastProcessed = recurring.lastProcessedDate ? parseISO(recurring.lastProcessedDate) : startDate;
                    let nextDate = lastProcessed;
                    let currentRecurring = { ...recurring };
                    while (true) {
                        if (recurring.frequency === 'daily') nextDate = addDays(nextDate, 1);
                        else if (recurring.frequency === 'weekly') nextDate = addWeeks(nextDate, 1);
                        else if (recurring.frequency === 'monthly') nextDate = addMonths(nextDate, 1);
                        if (isAfter(nextDate, now)) break;
                        const mKey = format(nextDate, 'yyyy-MM');
                        const newExpense = { id: self.crypto.randomUUID(), amount: recurring.amount, date: nextDate.toISOString(), categoryId: recurring.categoryId, recurringId: recurring.id };
                        if (!newData[mKey]) newData[mKey] = { month: mKey, initialAmount: 0, expenses: [] };
                        newData[mKey].expenses = [newExpense, ...newData[mKey].expenses];
                        currentRecurring.lastProcessedDate = nextDate.toISOString();
                        hasChanges = true;
                    }
                    return currentRecurring;
                });
                if (hasChanges) { setData(newData); setRecurringExpenses(updatedRecurring); }
            };

            const monthKey = format(currentMonth, 'yyyy-MM');
            const currentMonthData = data[monthKey];
            const filteredExpenses = useMemo(() => {
                if (!currentMonthData) return [];
                if (selectedCategoryFilter === 'all') return currentMonthData.expenses;
                return currentMonthData.expenses.filter(e => e.categoryId === selectedCategoryFilter);
            }, [currentMonthData, selectedCategoryFilter]);
            const totalSpent = currentMonthData ? currentMonthData.expenses.reduce((sum, exp) => sum + exp.amount, 0) : 0;
            const balance = currentMonthData ? currentMonthData.initialAmount - totalSpent : 0;

            const groupedHistory = useMemo(() => {
                const groups = {};
                filteredExpenses.forEach(expense => {
                    const dateKey = format(parseISO(expense.date), 'yyyy-MM-dd');
                    if (!groups[dateKey]) {
                        groups[dateKey] = { total: 0, expenses: [] };
                    }
                    groups[dateKey].total += expense.amount;
                    groups[dateKey].expenses.push(expense);
                });
                return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
            }, [filteredExpenses]);

            const reportData = useMemo(() => {
                const start = startOfDay(parseISO(reportDateRange.start));
                const end = endOfDay(parseISO(reportDateRange.end));
                const allExpenses = Object.values(data).flatMap(m => m.expenses);
                const filtered = allExpenses.filter(e => isWithinInterval(parseISO(e.date), { start, end }));
                const byCategory = categories.map(cat => {
                    const amount = filtered.filter(e => e.categoryId === cat.id).reduce((sum, e) => sum + e.amount, 0);
                    return { id: cat.id, name: cat.name, value: amount, color: cat.color };
                }).filter(c => c.value > 0);
                return { expenses: filtered, byCategory, total: filtered.reduce((sum, e) => sum + e.amount, 0) };
            }, [data, categories, reportDateRange]);

            const handleSetBudget = (e) => {
                e.preventDefault();
                const amount = parseFloat(budgetInput);
                if (isNaN(amount) || amount <= 0) return;
                setData(prev => ({ ...prev, [monthKey]: { month: monthKey, initialAmount: amount, expenses: prev[monthKey]?.expenses || [] } }));
                setBudgetInput(''); setShowBudgetModal(false);
            };

            const handleAddExpense = (e) => {
                e.preventDefault();
                const amount = parseFloat(expenseAmount);
                if (isNaN(amount) || amount <= 0) return;
                const newExpense = { id: self.crypto.randomUUID(), amount, date: new Date().toISOString(), categoryId: expenseCategory };
                if (isRecurring) {
                    const newRecurring = { id: self.crypto.randomUUID(), amount, categoryId: expenseCategory, frequency: recurringFrequency, startDate: new Date().toISOString(), lastProcessedDate: new Date().toISOString() };
                    setRecurringExpenses(prev => [...prev, newRecurring]);
                }
                setData(prev => {
                    const monthData = prev[monthKey] || { month: monthKey, initialAmount: 0, expenses: [] };
                    return { ...prev, [monthKey]: { ...monthData, expenses: [newExpense, ...monthData.expenses] } };
                });
                setExpenseAmount(''); setIsRecurring(false); setShowAddModal(false);
            };

            const handleCategorySubmit = (e) => {
                e.preventDefault();
                if (!catName.trim()) return;
                if (editingCategory) {
                    setCategories(prev => prev.map(c => c.id === editingCategory.id ? { ...c, name: catName, color: catColor } : c));
                } else {
                    setCategories(prev => [...prev, { id: self.crypto.randomUUID(), name: catName, color: catColor, icon: 'Tag' }]);
                }
                setCatName(''); setEditingCategory(null); setShowCategoryModal(false);
            };

            const formatCurrency = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
            const getCategory = (id) => categories.find(c => c.id === id) || { name: 'Khác', color: '#94a3b8' };
            const needsBudget = !currentMonthData || currentMonthData.initialAmount === 0;

            return (
                <div className="min-h-screen bg-slate-50 pb-24 max-w-md mx-auto relative shadow-xl flex flex-col border-x border-slate-200">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10 flex justify-between items-center">
                        <h1 className="text-xl font-bold text-slate-800">Quản Lý Thu Chi</h1>
                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full text-xs font-semibold">
                            <button onClick={() => setCurrentMonth(subMonths(currentMonth, 1))}><i data-lucide="chevron-left" className="w-4 h-4"></i></button>
                            <span className="min-w-[80px] text-center">{format(currentMonth, 'MM/yyyy')}</span>
                            <button onClick={() => setCurrentMonth(addMonths(currentMonth, 1))}><i data-lucide="chevron-right" className="w-4 h-4"></i></button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 space-y-6 overflow-y-auto">
                        {needsBudget && activeTab === 'overview' ? (
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 text-center space-y-6">
                                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto"><i data-lucide="wallet" className="w-8 h-8"></i></div>
                                <h2 className="text-xl font-bold">Thiết lập ngân sách</h2>
                                <form onSubmit={handleSetBudget} className="space-y-4">
                                    <input type="number" placeholder="Ví dụ: 10000000" className="w-full px-4 py-3 rounded-xl border border-slate-200 text-center text-lg font-semibold" value={budgetInput} onChange={(e) => setBudgetInput(e.target.value)} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Bắt đầu</button>
                                </form>
                            </div>
                        ) : (
                            <React.Fragment>
                                {activeTab === 'overview' && (
                                    <div className="space-y-6">
                                        <div className="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden">
                                            <div className="relative z-10 space-y-4">
                                                <div className="flex justify-between items-start">
                                                    <span className="text-indigo-100 text-sm font-medium">Số dư hiện tại</span>
                                                    <button onClick={() => { setBudgetInput(currentMonthData?.initialAmount || ''); setShowBudgetModal(true); }} className="text-xs bg-white/20 px-2 py-1 rounded-md">Sửa</button>
                                                </div>
                                                <div className="text-3xl font-bold">{formatCurrency(balance)}</div>
                                                <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/10 text-xs">
                                                    <div><span className="opacity-70 block">Ngân sách</span><span className="font-semibold">{formatCurrency(currentMonthData?.initialAmount || 0)}</span></div>
                                                    <div><span className="opacity-70 block">Đã chi</span><span className="font-semibold">{formatCurrency(totalSpent)}</span></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <h3 className="font-bold text-slate-800">Gần đây</h3>
                                            {filteredExpenses.slice(0, 5).map(exp => {
                                                const cat = getCategory(exp.categoryId);
                                                return (
                                                    <div key={exp.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ backgroundColor: `${cat.color}20`, color: cat.color }}><i data-lucide="tag" className="w-4 h-4"></i></div>
                                                            <div><div className="font-semibold text-sm">{cat.name}</div><div className="text-[10px] text-slate-400">{format(parseISO(exp.date), 'dd/MM HH:mm')}</div></div>
                                                        </div>
                                                        <div className="font-bold text-rose-600 text-sm">-{formatCurrency(exp.amount)}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'history' && (
                                    <div className="space-y-6">
                                        <h3 className="font-bold text-slate-800">Lịch sử chi tiêu</h3>
                                        {groupedHistory.map(([date, group]) => (
                                            <div key={date} className="space-y-3">
                                                <div className="flex items-center justify-between px-2">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                                        {format(parseISO(date), 'dd/MM/yyyy')}
                                                    </div>
                                                    <div className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">
                                                        Tổng: {formatCurrency(group.total)}
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    {group.expenses.map(exp => {
                                                        const cat = getCategory(exp.categoryId);
                                                        return (
                                                            <div key={exp.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ backgroundColor: `${cat.color}20`, color: cat.color }}><i data-lucide="tag" className="w-4 h-4"></i></div>
                                                                    <div><div className="font-semibold text-sm">{cat.name}</div><div className="text-[10px] text-slate-400">{format(parseISO(exp.date), 'HH:mm')}</div></div>
                                                                </div>
                                                                <div className="font-bold text-rose-600 text-sm">-{formatCurrency(exp.amount)}</div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                        {groupedHistory.length === 0 && (
                                            <div className="text-center py-12 text-slate-400 italic text-sm">
                                                Không có dữ liệu chi tiêu
                                            </div>
                                        )}
                                    </div>
                                )}
                                {activeTab === 'reports' && (
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                            <h3 className="font-bold text-slate-800">Tổng chi: <span className="text-rose-600">{formatCurrency(reportData.total)}</span></h3>
                                            {reportData.byCategory.length > 0 ? (
                                                <div className="h-64 w-full">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <PieChart>
                                                            <Pie data={reportData.byCategory} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                                {reportData.byCategory.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}
                                                            </Pie>
                                                            <Tooltip formatter={(v) => formatCurrency(v)} />
                                                            <Legend verticalAlign="bottom" height={36}/>
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            ) : <div className="h-64 flex items-center justify-center text-slate-400 italic">Không có dữ liệu</div>}
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                                            <h3 className="font-bold text-slate-800">Chi tiết theo danh mục</h3>
                                            {reportData.byCategory.map(cat => (
                                                <div key={cat.id} className="space-y-2">
                                                    <div className="flex justify-between text-sm"><span>{cat.name}</span><span className="font-bold">{formatCurrency(cat.value)}</span></div>
                                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                        <div className="h-full" style={{ width: `${(cat.value / reportData.total) * 100}%`, backgroundColor: cat.color }} />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'categories' && (
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center"><h3 className="font-bold text-slate-800">Danh mục</h3><button onClick={() => setShowCategoryModal(true)} className="text-xs bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold">+ Thêm</button></div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {categories.map(cat => (
                                                <div key={cat.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-2">
                                                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: `${cat.color}20`, color: cat.color }}><i data-lucide="tag" className="w-4 h-4"></i></div>
                                                    <div className="font-bold text-sm">{cat.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </React.Fragment>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-6 py-3 flex justify-between z-20">
                        <button onClick={() => setActiveTab('overview')} className={`flex flex-col items-center gap-1 ${activeTab === 'overview' ? "text-indigo-600" : "text-slate-400"}`}><i data-lucide="wallet" className="w-5 h-5"></i><span className="text-[10px] font-bold">VÍ</span></button>
                        <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 ${activeTab === 'history' ? "text-indigo-600" : "text-slate-400"}`}><i data-lucide="history" className="w-5 h-5"></i><span className="text-[10px] font-bold">LỊCH SỬ</span></button>
                        <div className="w-12" />
                        <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center gap-1 ${activeTab === 'reports' ? "text-indigo-600" : "text-slate-400"}`}><i data-lucide="pie-chart" className="w-5 h-5"></i><span className="text-[10px] font-bold">BÁO CÁO</span></button>
                        <button onClick={() => setActiveTab('categories')} className={`flex flex-col items-center gap-1 ${activeTab === 'categories' ? "text-indigo-600" : "text-slate-400"}`}><i data-lucide="settings" className="w-5 h-5"></i><span className="text-[10px] font-bold">CÀI ĐẶT</span></button>
                    </nav>

                    {!needsBudget && (
                        <button onClick={() => setShowAddModal(true)} className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white p-4 rounded-full shadow-2xl z-30"><i data-lucide="plus-circle" className="w-8 h-8"></i></button>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center">
                            <div className="absolute inset-0 bg-black/40" onClick={() => setShowAddModal(false)}></div>
                            <div className="relative bg-white w-full max-w-md rounded-t-[32px] p-8 space-y-6">
                                <h2 className="text-xl font-bold">Thêm khoản chi</h2>
                                <form onSubmit={handleAddExpense} className="space-y-6">
                                    <input type="number" className="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 text-2xl font-bold text-rose-600" value={expenseAmount} onChange={(e) => setExpenseAmount(e.target.value)} placeholder="0" autoFocus />
                                    <div className="grid grid-cols-3 gap-2">
                                        {categories.map(cat => (
                                            <button key={cat.id} type="button" onClick={() => setExpenseCategory(cat.id)} className={`flex flex-col items-center gap-1 p-2 rounded-xl border text-[10px] font-bold ${expenseCategory === cat.id ? "bg-indigo-50 border-indigo-200 text-indigo-600" : "bg-white border-slate-100 text-slate-400"}`}>
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }} />{cat.name}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                                        <span className="text-sm font-bold">Định kỳ</span>
                                        <button type="button" onClick={() => setIsRecurring(!isRecurring)} className={`w-10 h-5 rounded-full relative ${isRecurring ? "bg-indigo-600" : "bg-slate-300"}`}><div className={`absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all ${isRecurring ? "right-0.5" : "left-0.5"}`} /></button>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">LƯU</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
